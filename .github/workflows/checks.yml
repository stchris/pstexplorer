on: [push, pull_request]

name: Continuous integration

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v2
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt, clippy
      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER pstexplorer WITH PASSWORD 'pstexplorer';"
          sudo -u postgres psql -c "CREATE DATABASE pstexplorer OWNER pstexplorer;"
      - uses: j178/prek-action@v1
      - name: Run integration tests (postgres)
        env:
          POSTGRES_TEST_URL: postgres://pstexplorer:pstexplorer@localhost:5432/pstexplorer
        run: cargo test -- --ignored