services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pstexplorer
      POSTGRES_PASSWORD: pstexplorer
      POSTGRES_DB: pstexplorer
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pstexplorer"]
      interval: 5s
      timeout: 5s
      retries: 5
